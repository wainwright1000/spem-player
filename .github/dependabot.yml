version: 2
updates:
  # Keep npm dependencies up to date
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    # Group related dependencies into single PRs to reduce noise
    groups:
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vite-plugin-*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "vitest-fetch-mock"
      build-tools:
        patterns:
          - "typescript"
          - "eslint"
          - "sass-embedded"
          - "autoprefixer"
          - "clean-css-cli"
          - "postcss"
      types-and-testing:
        patterns:
          - "@types/*"
          - "jsdom"
          - "canvas"
      ohm:
        patterns:
          - "ohm-js"
          - "@ohm-js/*"
    # Optional: auto-label PRs for easier filtering
    labels:
      - "dependencies"
    commit-message:
      prefix: "[deps]"
      include: "scope"

  # Keep GitHub Actions up to date (if you add workflows later)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "github-actions"
